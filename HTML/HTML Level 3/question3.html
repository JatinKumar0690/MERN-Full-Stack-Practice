<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML level 3 practice question</title>
  </head>
  <body>
    <form>
      <h1>Feedback form</h1>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="write your name" />
      <br />
      <br />
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="write your email"
      />
      <br />
      <br />
      <label for="message">Message:</label>
      <br />
      <textarea name="message" id="message" rows="10" cols="20"></textarea>
      <br />
      <br />
      <label for="rating">Rate us out of 5:</label> <br />
      <input type="radio" name="rating" value="1" id="one" />
      <label for="one">1</label><br />

      <input type="radio" name="rating" value="2" id="two" />
      <label for="two">2</label><br />

      <input type="radio" name="rating" value="3" id="three" />
      <label for="three">3</label><br />

      <input type="radio" name="rating" value="4" id="four" />
      <label for="four">4</label><br />

      <input type="radio" name="rating" value="5" id="five" />
      <label for="five">5</label><br />
      <br />
      <button>submit</button>
    </form>
  </body>
</html>
